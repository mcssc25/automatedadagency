services:
  lead-scraper:
    image: gosom/google-maps-scraper:latest
    container_name: ad-agency-lead-scraper
    restart: unless-stopped
    command: ["-web", "-addr", ":8080", "-data-folder", "/gmapsdata"]
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - lead-scraper-data:/gmapsdata
      - gmaps-playwright-cache:/opt

  ad-agency-autopilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ad-agency-autopilot
    restart: unless-stopped
    depends_on:
      - lead-scraper
    env_file:
      - .env
    environment:
      PORT: "3000"
      LEAD_SCRAPER_URL: "http://lead-scraper:8080"
      LEAD_SCRAPER_DEPTH: "1"
      LEAD_SCRAPER_MAX_TIME_SECONDS: "600"
      LEAD_INTELLIGENCE_ENABLED: "true"
      LEAD_INTELLIGENCE_INTERVAL_MS: "3600000"
      LEAD_INTELLIGENCE_START_DELAY_MS: "120000"
      LEAD_INTELLIGENCE_MAX_OFFICES_PER_CYCLE: "${LEAD_INTELLIGENCE_MAX_OFFICES_PER_CYCLE:-8}"
      LEAD_INTELLIGENCE_STOP_AFTER_CONTACTS: "${LEAD_INTELLIGENCE_STOP_AFTER_CONTACTS:-true}"
      LEAD_INTELLIGENCE_SUPPRESS_BRAND_AFTER_FAILURE: "${LEAD_INTELLIGENCE_SUPPRESS_BRAND_AFTER_FAILURE:-true}"
      ROSTER_BROWSER_MAX_PAGES: "40"
      ROSTER_BROWSER_MAX_CONTACTS: "250"
      LEAD_INTELLIGENCE_RESEARCH_PROVIDER: "${LEAD_INTELLIGENCE_RESEARCH_PROVIDER:-}"
      OPENROUTER_ENABLED: "${OPENROUTER_ENABLED:-false}"
      OPENROUTER_DEFAULT_MODEL: "${OPENROUTER_DEFAULT_MODEL:-openrouter/free}"
      OPENROUTER_RESEARCH_MODEL: "${OPENROUTER_RESEARCH_MODEL:-openai/gpt-oss-120b:free}"
      OPENROUTER_MODEL_ORDER: "${OPENROUTER_MODEL_ORDER:-}"
      OPENROUTER_WEB_SEARCH_ENABLED: "${OPENROUTER_WEB_SEARCH_ENABLED:-false}"
      OPENROUTER_WEB_SEARCH_MAX_RESULTS: "${OPENROUTER_WEB_SEARCH_MAX_RESULTS:-5}"
      OPENROUTER_DAILY_REQUEST_LIMIT: "${OPENROUTER_DAILY_REQUEST_LIMIT:-200}"
      OPENROUTER_APP_NAME: "${OPENROUTER_APP_NAME:-Real Estate CRM Pro Lead Intelligence}"
    ports:
      - "127.0.0.1:3100:3000"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/app-config').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  lead-scraper-data:
  gmaps-playwright-cache:
