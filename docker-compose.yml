services:
  ad-agency-autopilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ad-agency-autopilot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
    ports:
      - "127.0.0.1:3100:3000"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/app-config').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
